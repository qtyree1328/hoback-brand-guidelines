<!-- MODULE: Mountain Drawing Section — Tan section with sketch + heading + CTA -->
<!-- Source: index.html -->
<!-- Dependencies: images/tetons_drawing4.png, images/hoback_drawing1.png -->
<!-- Note: Has two variants — default (image left, text right) and reversed -->

<style>
.mountain-drawing-section {
  position: relative; background: #ede9e1; padding: 80px 0; overflow: hidden;
}
.mountain-drawing-inner {
  display: flex; align-items: center; max-width: 1400px; margin: 0 auto;
}
.mountain-drawing-img { flex: 0 0 60%; margin-left: -80px; }
.mountain-drawing-img img { width: 100%; max-width: 950px; opacity: 0.55; }
.mountain-drawing-text { flex: 1; padding: 0 60px 0 40px; text-align: right; }
.mountain-drawing-sub {
  font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.25em; color: #7a8d98; margin-bottom: 20px;
}
.mountain-drawing-headline {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 3.6rem; font-weight: 300; color: #1e2d3a;
  line-height: 1.15; margin-bottom: 40px;
}
.mountain-drawing-btn {
  display: inline-block; padding: 16px 40px; background: #1e2d3a; color: #fff;
  font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.2em; transition: background 0.3s; text-decoration: none;
}
.mountain-drawing-btn:hover { background: #365e75; }

/* Reversed variant */
.mountain-drawing-reversed .mountain-drawing-inner { flex-direction: row-reverse; }
.mountain-drawing-reversed .mountain-drawing-img { flex: 0 0 60%; margin-left: 0; margin-right: -250px; }
.mountain-drawing-reversed .mountain-drawing-img img { max-height: 250px; width: auto; max-width: 700px; }
.mountain-drawing-reversed .mountain-drawing-text { text-align: left; }

@media (max-width: 1200px) {
  .mountain-drawing-inner { max-width: 100%; }
  .mountain-drawing-headline { font-size: 2.8rem; }
}
@media (max-width: 768px) {
  .mountain-drawing-section { padding: 50px 0; }
  .mountain-drawing-inner { flex-direction: column; align-items: flex-end; }
  .mountain-drawing-img { flex: none; margin-left: -30px; margin-bottom: 30px; width: calc(100% + 30px); }
  .mountain-drawing-text { padding: 0 30px; text-align: right; }
  .mountain-drawing-headline { font-size: 2.2rem; }
  .mountain-drawing-reversed .mountain-drawing-inner { flex-direction: column; }
  .mountain-drawing-reversed .mountain-drawing-img { flex: none; margin-right: -30px; margin-left: 0; margin-bottom: 30px; }
  .mountain-drawing-reversed .mountain-drawing-img img { max-height: 250px; max-width: 100%; }
  .mountain-drawing-reversed .mountain-drawing-text { text-align: center; padding: 0 30px; }
}
</style>

<!-- HTML: Default variant (image left, text right) -->
<section class="mountain-drawing-section">
  <div class="mountain-drawing-inner">
    <div class="mountain-drawing-img">
      <img src="images/tetons_drawing4.png" alt="Teton Mountains Sketch">
    </div>
    <div class="mountain-drawing-text">
      <p class="mountain-drawing-sub">Jackson Hole, Wyoming</p>
      <h2 class="mountain-drawing-headline">An Experience<br>Unlike Any Other</h2>
      <a href="stay.html" class="mountain-drawing-btn">Learn More</a>
    </div>
  </div>
</section>

<!-- HTML: Reversed variant (image right, text left) -->
<section class="mountain-drawing-section mountain-drawing-reversed">
  <div class="mountain-drawing-inner">
    <div class="mountain-drawing-img">
      <img src="images/hoback_drawing1.png" alt="Hoback Club Sketch">
    </div>
    <div class="mountain-drawing-text">
      <p class="mountain-drawing-sub">Jackson Hole, Wyoming</p>
      <h2 class="mountain-drawing-headline">Reserve<br>Your Stay</h2>
      <a href="stay.html" class="mountain-drawing-btn">Inquire About a Stay</a>
    </div>
  </div>
</section>
