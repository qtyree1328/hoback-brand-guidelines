<!-- MODULE: Weather Bar — 5-day forecast strip -->
<!-- Source: index.html, mountain.html -->
<!-- Dependencies: None -->

<style>
.weather-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 25px 60px; background: #f7f5f2; border-bottom: 1px solid #e8e4df;
}
.weather-bar h3 {
  font-size: 1rem; font-weight: 400; text-transform: uppercase;
  letter-spacing: 0.15em; color: #272f36;
  display: flex; align-items: center; gap: 10px;
}
.forecast { display: flex; gap: 35px; align-items: center; }
.forecast-day { text-align: center; }
.forecast-day .day { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: #666; margin-bottom: 2px; }
.forecast-day .date { font-size: 1.4rem; font-weight: 300; color: #272f36; margin-bottom: 4px; }
.forecast-day .temp { font-size: 0.8rem; color: #555; }
.weather-bar-btns { display: flex; gap: 12px; align-items: center; }
.ski-conditions-btn {
  display: inline-block; padding: 14px 30px; background: #1e2d3a; color: #fff;
  font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.2em; transition: all 0.3s; cursor: pointer; border: none;
  text-decoration: none;
}
.ski-conditions-btn:hover { background: #365e75; }
@media (max-width: 768px) {
  .weather-bar { flex-wrap: wrap; padding: 20px 30px; gap: 15px; }
}
</style>

<!-- HTML -->
<section class="weather-bar" id="weatherBar">
  <h3>Weather This Week</h3>
  <div class="forecast">
    <div class="forecast-day">
      <div class="day">Thu</div>
      <div class="date">5</div>
      <div class="temp">28&ordm; F</div>
    </div>
    <div class="forecast-day">
      <div class="day">Fri</div>
      <div class="date">6</div>
      <div class="temp">24&ordm; F</div>
    </div>
    <div class="forecast-day">
      <div class="day">Sat</div>
      <div class="date">7</div>
      <div class="temp">30&ordm; F</div>
    </div>
    <div class="forecast-day">
      <div class="day">Sun</div>
      <div class="date">8</div>
      <div class="temp">35&ordm; F</div>
    </div>
    <div class="forecast-day">
      <div class="day">Mon</div>
      <div class="date">9</div>
      <div class="temp">32&ordm; F</div>
    </div>
  </div>
  <div class="weather-bar-btns">
    <a href="mountain.html" class="ski-conditions-btn">Mountain Conditions</a>
  </div>
</section>
