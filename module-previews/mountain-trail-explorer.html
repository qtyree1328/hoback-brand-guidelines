<!-- MODULE: Trail Explorer — Interactive Mapbox trail map -->
<!-- Source: mountain.html -->
<!-- Dependencies: Mapbox GL JS (mapbox-gl.js + mapbox-gl.css), API token -->

<link href="https://api.mapbox.com/mapbox-gl-js/v3.9.3/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.9.3/mapbox-gl.js"></script>

<style>
.trail-explorer-section { background: #fff; padding: 60px 0 0; }
.trail-explorer-header { text-align: center; padding: 0 30px 30px; }
.trail-explorer-header h2 {
  font-size: 2.4rem;
  font-weight: 300;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: #1e2d3a;
}
.trail-explorer-header p { color: #5a6d7a; font-size: 0.9rem; margin-top: 6px; }
.trail-explorer-map { width: 100%; height: 700px; position: relative; }
#trailExplorerSpinner {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 10;
  background: rgba(30,45,58,0.85);
  color: #fff;
  padding: 16px 28px;
  border-radius: 6px;
  font-family: "Lato", sans-serif;
  font-size: 0.85rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 10px;
}
#trailExplorerLegend {
  position: absolute;
  bottom: 30px;
  right: 10px;
  z-index: 5;
  background: rgba(255,255,255,0.94);
  backdrop-filter: blur(6px);
  border-radius: 8px;
  padding: 14px 18px;
  font-family: "Lato", sans-serif;
  font-size: 0.75rem;
  box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  display: none;
}
#trailExplorerLegend .legend-title {
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 10px;
  color: #1e2d3a;
  font-size: 0.7rem;
}
#trailExplorerLegend .legend-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; color: #333; }
.te-popup { font-family: "Lato", sans-serif; max-width: 300px; }
.te-popup h3 { display: flex; align-items: center; gap: 8px; font-size: 1.05rem; color: #1e2d3a; margin: 0 0 4px; line-height: 1.3; }
.te-popup .te-diff { font-size: 0.82rem; font-weight: 600; margin: 2px 0 8px; }
.te-popup .te-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px; margin-bottom: 8px; }
.te-popup .te-stat { font-size: 0.78rem; color: #555; }
.te-popup .te-stat strong { color: #1e2d3a; }
.te-popup .te-ref { display: inline-block; background: #eee; border-radius: 3px; padding: 0 5px; font-size: 0.75rem; font-weight: 600; color: #333; }
.te-popup .te-flags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; font-size: 0.75rem; }
.te-popup .te-flag { background: #f0f0f0; border-radius: 3px; padding: 2px 6px; }
.te-popup .te-elev-chart { margin-top: 8px; }
.te-popup .te-lift-type { font-size: 0.85rem; color: #555; text-transform: capitalize; margin: 2px 0 8px; }
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
@media (max-width: 768px) {
  .trail-explorer-map { height: 500px; }
}
</style>

<section class="trail-explorer-section" id="trailExplorerSection">
  <div class="trail-explorer-header">
    <h2>Trail Explorer</h2>
    <p>Interactive Jackson Hole trail map with elevation profiles</p>
  </div>
  <div style="position:relative;">
    <div class="trail-explorer-map" id="trailExplorerMap"></div>
    <div id="mapInteractBlocker" style="position:absolute;inset:0;z-index:8;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.15);cursor:default;transition:opacity 0.3s;">
      <button id="mapInteractBtn" style="padding:14px 32px;background:#1e2d3a;color:#fff;border:2px solid #fff;border-radius:6px;font-family:'Lato',sans-serif;font-size:0.9rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,0.3);transition:all 0.2s;">
        Interact with Map
      </button>
    </div>
    <div id="trailExplorerSpinner">
      <span style="display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;"></span>
      Loading enriched trail data...
    </div>
    <div id="trailExplorerLegend">
      <div class="legend-title">Trail Difficulty</div>
      <div class="legend-row"><svg width="18" height="18"><circle cx="9" cy="9" r="7" fill="hsl(125,100%,33%)"/></svg> Easy / Novice</div>
      <div class="legend-row"><svg width="18" height="18"><rect x="2" y="2" width="14" height="14" fill="hsl(208,100%,33%)"/></svg> Intermediate</div>
      <div class="legend-row"><svg width="18" height="18"><polygon points="9,2 16,9 9,16 2,9" fill="#000"/></svg> Advanced / Expert</div>
      <div class="legend-row"><svg width="18" height="18"><polygon points="9,2 16,9 9,16 2,9" fill="hsl(34,100%,50%)" stroke="#fff" stroke-width="0.5"/></svg> Freeride</div>
      <div class="legend-row" style="margin-top:4px;"><span style="width:20px;height:0;border-top:2px dashed #555;display:inline-block;"></span> Lift</div>
    </div>
  </div>
</section>

<script>
(function() {
  if (typeof mapboxgl === "undefined") {
    document.getElementById("trailExplorerSpinner").innerHTML = "Mapbox failed to load";
    return;
  }

  var MAPBOX_TOKEN = ["pk.eyJ1IjoicXR5cm","VlIiwiYSI6ImNtaHl5","eHNmeDBoY3oybXEwNT","IxNGgxYmsifQ.VqoAK","KHQxQX-lNNPwVKHmw"].join("");
  mapboxgl.accessToken = MAPBOX_TOKEN;

  var TE_COLORS = { easy:"hsl(125,100%,33%)", intermediate:"hsl(208,100%,33%)", advanced:"hsl(0,0%,0%)", expert:"hsl(0,0%,0%)", freeride:"hsl(34,100%,50%)" };
  var TE_LABELS = { easy:"Easy", intermediate:"Intermediate", advanced:"Advanced", expert:"Expert", freeride:"Freeride" };

  function teBadge(diff) {
    var c = TE_COLORS[diff] || "#888";
    if (diff === "easy") return '<svg width="18" height="18"><circle cx="9" cy="9" r="7" fill="' + c + '"/></svg>';
    if (diff === "intermediate") return '<svg width="18" height="18"><rect x="2" y="2" width="14" height="14" fill="' + c + '"/></svg>';
    if (diff === "advanced" || diff === "expert") return '<svg width="18" height="18"><polygon points="9,2 16,9 9,16 2,9" fill="' + c + '"/></svg>';
    if (diff === "freeride") return '<svg width="18" height="18"><polygon points="9,2 16,9 9,16 2,9" fill="' + c + '" stroke="#fff" stroke-width="0.5"/></svg>';
    return '<svg width="18" height="18"><circle cx="9" cy="9" r="7" fill="#888"/></svg>';
  }

  function elevChart(heights, diff) {
    if (!heights || heights.length < 2) return "";
    var W = 200, H = 80, pad = 2;
    var mn = Math.min.apply(null, heights);
    var mx = Math.max.apply(null, heights);
    var range = mx - mn || 1;
    var pts = heights.map(function(h, i) {
      var x = pad + (i / (heights.length - 1)) * (W - pad * 2);
      var y = H - pad - ((h - mn) / range) * (H - pad * 2);
      return x + "," + y;
    });
    var fillPts = pts.join(" ") + " " + (W - pad) + "," + (H - pad) + " " + pad + "," + (H - pad);
    var c = TE_COLORS[diff] || "#888";
    var fc = diff === "advanced" || diff === "expert" ? "rgba(100,100,100,0.2)" : c.replace(")", ",0.2)").replace("hsl", "hsla");
    return '<div class="te-elev-chart"><svg width="' + W + '" height="' + H + '" style="display:block;border-radius:4px;background:#fafafa;">' +
      '<polygon points="' + fillPts + '" fill="' + fc + '"/>' +
      '<polyline points="' + pts.join(" ") + '" fill="none" stroke="' + c + '" stroke-width="2"/>' +
      '<text x="4" y="12" font-size="9" fill="#888">' + mx.toFixed(0) + 'm</text>' +
      '<text x="4" y="' + (H - 4) + '" font-size="9" fill="#888">' + mn.toFixed(0) + 'm</text>' +
      '</svg></div>';
  }

  var teMap = new mapboxgl.Map({
    container: "trailExplorerMap",
    style: "mapbox://styles/mapbox/satellite-streets-v12",
    center: [-110.849, 43.588],
    zoom: 13.5,
    pitch: 60,
    bearing: -30,
    maxPitch: 85,
    antialias: true,
    interactive: false
  });
  teMap.addControl(new mapboxgl.NavigationControl(), "top-right");

  document.getElementById("mapInteractBtn").addEventListener("click", function() {
    teMap.scrollZoom.enable();
    teMap.boxZoom.enable();
    teMap.dragRotate.enable();
    teMap.dragPan.enable();
    teMap.keyboard.enable();
    teMap.doubleClickZoom.enable();
    teMap.touchZoomRotate.enable();
    teMap.touchPitch.enable();
    var blocker = document.getElementById("mapInteractBlocker");
    blocker.style.opacity = "0";
    setTimeout(function() { blocker.style.display = "none"; }, 300);
  });

  teMap.on("style.load", function() {
    teMap.addSource("mapbox-dem-te", { type: "raster-dem", url: "mapbox://mapbox.mapbox-terrain-dem-v1", tileSize: 512, maxzoom: 14 });
    teMap.setTerrain({ source: "mapbox-dem-te", exaggeration: 1.5 });
    teMap.setFog({ color: "rgba(186,210,235,0.4)", "high-color": "rgba(36,92,223,0.3)", "horizon-blend": 0.02, "space-color": "rgba(11,11,25,1)", "star-intensity": 0.1 });

    Promise.all([
      fetch("../data/jh-runs.geojson").then(function(r) { return r.json(); }),
      fetch("../data/jh-lifts.geojson").then(function(r) { return r.json(); })
    ]).then(function(results) {
      var runs = results[0];
      var lifts = results[1];
      document.getElementById("trailExplorerSpinner").style.display = "none";
      document.getElementById("trailExplorerLegend").style.display = "block";

      teMap.addSource("te-runs", { type: "geojson", data: runs });
      teMap.addSource("te-lifts", { type: "geojson", data: lifts });

      var diffColor = ["match", ["get", "difficulty"],
        "easy", "hsl(125,100%,33%)",
        "intermediate", "hsl(208,100%,33%)",
        "advanced", "hsl(0,0%,0%)",
        "expert", "hsl(0,0%,0%)",
        "freeride", "hsl(34,100%,50%)",
        "hsl(208,100%,33%)"
      ];

      teMap.addLayer({ id: "te-runs-casing", type: "line", source: "te-runs", paint: { "line-color": "#000", "line-width": 5, "line-opacity": 0.35 } });
      teMap.addLayer({ id: "te-runs-line", type: "line", source: "te-runs", paint: { "line-color": diffColor, "line-width": 3 } });
      teMap.addLayer({ id: "te-lifts-line", type: "line", source: "te-lifts", paint: { "line-color": "#555", "line-width": 2, "line-dasharray": [4, 3] } });
      teMap.addLayer({ id: "te-runs-label", type: "symbol", source: "te-runs", layout: { "symbol-placement": "line", "text-field": ["get", "name"], "text-size": 11, "text-font": ["DIN Pro Medium", "Arial Unicode MS Regular"], "text-allow-overlap": false }, paint: { "text-color": "#fff", "text-halo-color": "rgba(0,0,0,0.7)", "text-halo-width": 1.5 } });
      teMap.addLayer({ id: "te-lifts-label", type: "symbol", source: "te-lifts", layout: { "symbol-placement": "line", "text-field": ["get", "name"], "text-size": 11, "text-font": ["DIN Pro Medium", "Arial Unicode MS Regular"], "text-allow-overlap": false }, paint: { "text-color": "#ddd", "text-halo-color": "rgba(0,0,0,0.7)", "text-halo-width": 1.5 } });

      teMap.on("click", "te-runs-line", function(e) {
        var p = e.features[0].properties;
        var diff = p.difficulty || "intermediate";
        var name = p.name || "Unnamed Run";
        var ref = p.ref ? '<span class="te-ref">' + p.ref + "</span> " : "";
        var diffLabel = TE_LABELS[diff] || diff;
        var c = TE_COLORS[diff] || "#888";
        var html = '<div class="te-popup"><h3>' + teBadge(diff) + " " + ref + name + "</h3>";
        html += '<div class="te-diff" style="color:' + c + '">' + diffLabel + "</div>";
        html += '<div class="te-stats">';
        if (p.distance) html += "<div class=\"te-stat\"><strong>Distance:</strong> " + (p.distance >= 1000 ? (p.distance/1000).toFixed(1) + " km" : p.distance + " m") + "</div>";
        if (p.descent) html += "<div class=\"te-stat\"><strong>Descent:</strong> " + p.descent + "m vertical</div>";
        if (p.avgSlope) html += "<div class=\"te-stat\"><strong>Avg slope:</strong> " + p.avgSlope + "</div>";
        if (p.maxSlope) html += "<div class=\"te-stat\"><strong>Max slope:</strong> " + p.maxSlope + "</div>";
        if (p.maxElevation) html += "<div class=\"te-stat\"><strong>Summit:</strong> " + p.maxElevation + "m</div>";
        if (p.minElevation) html += "<div class=\"te-stat\"><strong>Base:</strong> " + p.minElevation + "m</div>";
        html += "</div>";
        var ep = p.elevationProfile;
        if (typeof ep === "string") try { ep = JSON.parse(ep); } catch (err) {}
        if (ep && ep.heights) html += elevChart(ep.heights, diff);
        var flags = [];
        if (p.grooming) flags.push("Mountain: " + (typeof p.grooming === "string" ? p.grooming.replace(/_/g, " ") : "Groomed"));
        if (p.snowmaking === true || p.snowmaking === "yes") flags.push("Snowmaking");
        if (p.lit === true || p.lit === "yes") flags.push("Night skiing");
        if (p.gladed === true || p.gladed === "yes") flags.push("Gladed");
        if (flags.length) html += '<div class="te-flags">' + flags.map(function(f) { return '<span class="te-flag">' + f + "</span>"; }).join("") + "</div>";
        html += "</div>";
        new mapboxgl.Popup({ offset: 14, maxWidth: "320px" }).setLngLat(e.lngLat).setHTML(html).addTo(teMap);
      });

      teMap.on("click", "te-lifts-line", function(e) {
        var p = e.features[0].properties;
        var liftType = (p.liftType || "").replace(/_/g, " ");
        var html = '<div class="te-popup"><h3> ' + (p.name || "Unnamed Lift") + "</h3>";
        if (liftType) html += '<div class="te-lift-type">' + liftType + "</div>";
        html += '<div class="te-stats">';
        if (p.distance) html += "<div class=\"te-stat\"><strong>Length:</strong> " + (p.distance >= 1000 ? (p.distance/1000).toFixed(1) + " km" : p.distance + " m") + "</div>";
        if (p.occupancy) html += "<div class=\"te-stat\"><strong>Occupancy:</strong> " + p.occupancy + "</div>";
        if (p.capacity) html += "<div class=\"te-stat\"><strong>Capacity:</strong> " + p.capacity + "/hr</div>";
        if (p.duration) html += "<div class=\"te-stat\"><strong>Ride time:</strong> " + Math.round(p.duration/60) + " min</div>";
        html += "</div>";
        var flags = [];
        if (p.heating) flags.push("Heated");
        if (p.bubble) flags.push("Bubble");
        if (flags.length) html += '<div class="te-flags">' + flags.map(function(f) { return '<span class="te-flag">' + f + "</span>"; }).join("") + "</div>";
        html += "</div>";
        new mapboxgl.Popup({ offset: 14, maxWidth: "300px" }).setLngLat(e.lngLat).setHTML(html).addTo(teMap);
      });

      ["te-runs-line", "te-lifts-line"].forEach(function(layer) {
        teMap.on("mouseenter", layer, function() { teMap.getCanvas().style.cursor = "pointer"; });
        teMap.on("mouseleave", layer, function() { teMap.getCanvas().style.cursor = ""; });
      });
    }).catch(function(err) {
      console.error("Trail Explorer data error:", err);
      document.getElementById("trailExplorerSpinner").innerHTML = "Trail data requires a local server (file:// blocks fetch). Run with <code>npx serve</code> from the repo root.";
      document.getElementById("trailExplorerSpinner").style.display = "block";
    });
  });
})();
</script>
