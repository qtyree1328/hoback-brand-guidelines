<!-- MODULE: Image Gallery — Horizontal scrollable image strip -->
<!-- Source: index.html -->
<!-- Dependencies: gallery-config.js (GALLERY_IMAGES array) -->

<style>
.img-carousel {
  background: #ede9e1;
  padding: 50px 0 45px;
  overflow-x: auto;
  overflow-y: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.img-carousel::-webkit-scrollbar { display: none; }

.img-carousel__track {
  display: flex;
  align-items: center;
  gap: 28px;
  padding: 0;
  width: max-content;
}

.img-carousel__slide {
  flex-shrink: 0;
  border-radius: 8px;
  overflow: hidden;
}

.img-carousel__slide img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

@media (max-width: 768px) {
  .img-carousel { padding: 60px 0 50px; }
  .img-carousel__track { gap: 36px; padding: 0 30px; }
}
</style>

<section class="img-carousel" id="imgGallery">
  <div class="img-carousel__track" id="imgCarouselTrack"></div>
</section>

<script>
var GALLERY_IMAGES = [
  { src: "https://hobackclub.com/images/dynamic/getImage.gif?ID=100149", alt: "CE 100149", scale: 1.4, aspect: 0.6 },
  { src: "https://hobackclub.com/images/dynamic/getImage.gif?ID=100151", alt: "CE 100151", scale: 0.8, aspect: 1.25 },
  { src: "https://hobackclub.com/images/dynamic/getImage.gif?ID=100152", alt: "CE 100152", scale: 1.6, aspect: 0.5 },
  { src: "https://hobackclub.com/images/dynamic/getImage.gif?ID=100156", alt: "CE 100156", scale: 0.9, aspect: 1.0 },
  { src: "https://hobackclub.com/images/dynamic/getImage.gif?ID=100167", alt: "CE 100167", scale: 1.3, aspect: 0.7 },
  { src: "https://hobackclub.com/images/dynamic/getImage.gif?ID=100170", alt: "CE 100170", scale: 0.75, aspect: 1.35 },
  { src: "https://hobackclub.com/images/dynamic/getImage.gif?ID=100169", alt: "CE 100169", scale: 1.5, aspect: 0.55 },
  { src: "https://hobackclub.com/images/dynamic/getImage.gif?ID=100172", alt: "CE 100172", scale: 1.0, aspect: 0.85 }
];

(function() {
  var track = document.getElementById('imgCarouselTrack');
  if (!track) return;

  var BASE_WIDTH = 130;

  // Build one set of slides and measure, then duplicate enough to fill seamless loop
  function makeSlide(item) {
    var w = Math.round(BASE_WIDTH * (item.scale || 1));
    var slide = document.createElement('div');
    slide.className = 'img-carousel__slide';
    slide.style.width = w + 'px';
    slide.style.height = Math.round(w * (item.aspect || 0.75)) + 'px';
    var img = document.createElement('img');
    img.src = item.src;
    img.alt = item.alt || '';
    img.loading = 'lazy';
    slide.appendChild(img);
    return slide;
  }

  // Append 3 copies so the strip is wide enough to loop seamlessly
  for (var copy = 0; copy < 3; copy++) {
    GALLERY_IMAGES.forEach(function(item) {
      track.appendChild(makeSlide(item));
    });
  }

  var container = document.getElementById('imgGallery');
  if (!container) return;

  // Measure width of one set (slides + gaps)
  var slidesPerSet = GALLERY_IMAGES.length;
  var allSlides = track.querySelectorAll('.img-carousel__slide');
  var gap = 28;
  var oneSetWidth = 0;
  for (var i = 0; i < slidesPerSet; i++) {
    oneSetWidth += allSlides[i].offsetWidth + gap;
  }

  container.scrollLeft = 0;

  var speed = 0.4;
  var paused = false;
  var resumeTimer;

  function drift() {
    if (!paused) {
      container.scrollLeft += speed;
      // When we've scrolled past one full set, jump back seamlessly
      if (container.scrollLeft >= oneSetWidth) {
        container.scrollLeft -= oneSetWidth;
      }
    }
    requestAnimationFrame(drift);
  }
  requestAnimationFrame(drift);

  function pause() { paused = true; clearTimeout(resumeTimer); }
  function resume() { clearTimeout(resumeTimer); resumeTimer = setTimeout(function() { paused = false; }, 2000); }
  container.addEventListener('mouseenter', pause);
  container.addEventListener('mouseleave', resume);
  container.addEventListener('touchstart', pause, { passive: true });
  container.addEventListener('touchend', resume, { passive: true });
})();
</script>
