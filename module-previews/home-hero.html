<!-- MODULE: Home Hero — Full-screen video with curtain reveal -->
<!-- Source: index.html -->
<!-- Dependencies: hero video file (images/hoback-video.mp4), fallback bg image -->

<style>
/* ===== HOME HERO ===== */
.hero {
  position: relative;
  height: 100vh;
  min-height: 600px;
  overflow: hidden;
  background: url('https://hobackclub.com/images/dynamic/getImage.gif?ID=100032') center/cover no-repeat;
}
.hero-mask {
  position: absolute; inset: 0;
  clip-path: polygon(50% 0%, 50% 0%, 50% 100%, 50% 100%);
  overflow: hidden;
}
.hero-mask.open {
  animation: maskReveal 0.8s cubic-bezier(.76,.09,.215,1) forwards;
}
@keyframes maskReveal {
  to { clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%); }
}
.hero-mask video {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  transform: scale(1.05);
}
.hero-mask.open video {
  animation: videoSettle 2s ease-out forwards;
}
@keyframes videoSettle { to { transform: scale(1); } }
.hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(30,45,58,0.65) 0%, rgba(30,45,58,0.2) 40%, transparent 100%);
  pointer-events: none; opacity: 0;
}
.hero-mask.open .hero-overlay { animation: fadeIn 2s ease-out forwards; }
@keyframes fadeIn { to { opacity: 1; } }
.hero-text {
  position: absolute; bottom: 80px; left: 0; right: 0;
  text-align: center; z-index: 2;
  opacity: 0; transform: translateY(20%);
}
.hero-text.visible { animation: fadeInUp 0.6s ease forwards; }
@keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
.hero-text h1 {
  color: #fff; font-size: 3.2rem; font-weight: 300;
  letter-spacing: 0.25em; text-transform: uppercase;
}
.scroll-down {
  position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
  z-index: 2; color: #fff; display: flex; flex-direction: column;
  align-items: center; gap: 8px; opacity: 0;
}
.scroll-down.visible { animation: fadeIn 0.5s ease forwards; }
.scroll-down span {
  display: inline-block; width: 1px; height: 30px; background: #fff;
  animation: scrollPulse 2s infinite;
}
@keyframes scrollPulse {
  0%, 100% { opacity: 0.3; transform: scaleY(0.5); }
  50% { opacity: 1; transform: scaleY(1); }
}
@media (max-width: 768px) {
  .hero { min-height: 400px; }
  .hero-text h1 { font-size: 1.8rem; letter-spacing: 0.15em; }
  .hero-text { bottom: 60px; }
}
.replay-btn {
  position: absolute; top: 20px; right: 20px; z-index: 10;
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
  color: #fff; cursor: pointer; display: grid; place-items: center;
  backdrop-filter: blur(4px); transition: background 0.2s;
}
.replay-btn:hover { background: rgba(255,255,255,0.25); }
.replay-btn svg { width: 18px; height: 18px; }
</style>

<!-- HTML -->
<section class="hero" id="heroSection">
  <button class="replay-btn" id="replayBtn" title="Replay animation">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
  </button>
  <div class="hero-mask" id="heroMask">
    <video autoplay muted loop playsinline id="heroVideo">
      <source src="https://qtyree1328.github.io/hoback-demo/images/hoback-video.mp4" type="video/mp4">
    </video>
    <div class="hero-overlay"></div>
    <div class="hero-text" id="heroText">
      <h1>Hoback Club, Jackson Hole</h1>
    </div>
    <div class="scroll-down" id="scrollDown">
      <span></span>
    </div>
  </div>
</section>

<!-- JS -->
<script>
// Hero curtain reveal
function runHeroAnimation() {
  var mask = document.getElementById('heroMask');
  var text = document.getElementById('heroText');
  var arrow = document.getElementById('scrollDown');
  if (!mask) return;
  // Reset
  mask.classList.remove('open');
  text.classList.remove('visible');
  arrow.classList.remove('visible');
  // Force reflow
  void mask.offsetWidth;
  // Play
  setTimeout(function() { mask.classList.add('open'); }, 200);
  setTimeout(function() { text.classList.add('visible'); }, 900);
  setTimeout(function() { arrow.classList.add('visible'); }, 1400);
}
runHeroAnimation();

document.getElementById('replayBtn').addEventListener('click', runHeroAnimation);
</script>
